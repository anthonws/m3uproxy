services:
  m3uproxy:
    container_name: m3uproxy
    # Tracks the latest 1.x tagged release (updates on `docker compose pull`, not on every
    # main merge). Pin tighter (e.g. :1.7) for stricter reproducibility, or :latest for dev.
    image: ghcr.io/anthonws/m3uproxy:1
    ports:
      - "7654:7654"
    env_file:
      - .env
    restart: unless-stopped
    # Cap log disk usage so per-request lines can't fill the NAS over time.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

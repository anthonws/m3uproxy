services:
  m3uproxy:
    container_name: m3uproxy
    image: ghcr.io/anthonws/m3uproxy:latest
    ports:
      - "7654:7654"
    env_file:
      - .env
    restart: unless-stopped
    # Cap log disk usage so per-request lines can't fill the NAS over time.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
